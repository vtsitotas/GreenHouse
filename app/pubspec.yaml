name: greenhouse_app
description: Greenhouse IoT monitoring and control app
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  mqtt_client: ^10.4.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3
  mobile_scanner: ^5.2.3
  go_router: ^14.6.2
  http: ^0.13.6
  multicast_dns: ^0.3.2
  cupertino_icons: ^1.0.8
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.0
  geolocator: ^13.0.2
  fl_chart: ^1.1.0
  flutter_mjpeg: ^2.0.0
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

# fl_chart 1.1.0 calls Matrix4 extension methods (translateByDouble/
# scaleByDouble) that only exist from vector_math 2.1.5 onward, but this
# Flutter SDK (3.32.4) pins vector_math to exactly 2.1.4 in its own
# pubspec.yaml. vector_math 2.4.0+ requires Dart SDK >=3.10, which is newer
# than this Flutter SDK's bundled Dart (3.8.1). 2.3.0 is the highest
# vector_math release compatible with both constraints. Safe to remove this
# override once the Flutter SDK here is upgraded past whatever version pins
# a vector_math with the needed Matrix4 methods natively.
dependency_overrides:
  vector_math: 2.3.0
