# Mosquitto → HiveMQ Cloud bridge.
# Bridges all greenhouse/# topics in both directions so the Flutter app can
# connect to HiveMQ when outside the home network.

connection hivemq-bridge
address 5d0f2497a0ba4a41a762943a32738484.s1.eu.hivemq.cloud:8883
bridge_protocol_version mqttv311
remote_username greenhouse
remote_password Greenhouse2026
bridge_cafile /etc/ssl/certs/ca-certificates.crt
bridge_tls_version tlsv1.2
topic greenhouse/# both 1
start_type automatic
restart_timeout 5
