# ── Loopback plaintext ─────────────────────────────────────────────────────
# Used by local tooling (Node-RED, simulator) only. Not reachable externally.
listener 1883 127.0.0.1
allow_anonymous true

# ── MQTT over TLS — WROOM bridge nodes ─────────────────────────────────────
listener 8883
cafile /home/pi/greenhouse/certs/ca.crt
certfile /home/pi/greenhouse/certs/server.crt
keyfile /home/pi/greenhouse/certs/server.key
require_certificate false
allow_anonymous false
password_file /etc/mosquitto/passwd

# ── MQTT over WebSocket + TLS — Flutter app ─────────────────────────────────
listener 9001
protocol websockets
cafile /home/pi/greenhouse/certs/ca.crt
certfile /home/pi/greenhouse/certs/server.crt
keyfile /home/pi/greenhouse/certs/server.key
require_certificate false
allow_anonymous false
password_file /etc/mosquitto/passwd

# ── Persistence ─────────────────────────────────────────────────────────────
# Required for retained messages to survive broker restarts.
persistence true
persistence_location /var/lib/mosquitto/

# ── Logging ─────────────────────────────────────────────────────────────────
log_dest syslog
log_type error
log_type warning
log_type notice
