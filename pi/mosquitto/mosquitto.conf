# Greenhouse listener/auth config, loaded via /etc/mosquitto/conf.d/.
# Persistence + logging are left to the stock /etc/mosquitto/mosquitto.conf
# (defining them here would be a duplicate and refuse to start).

# per_listener_settings lets each listener have its own auth: the loopback
# listener stays anonymous for local tooling while the TLS listeners require
# a password. With this on, password_file/allow_anonymous are set per listener.
per_listener_settings true

# ── Loopback plaintext ─────────────────────────────────────────────────────
# Used by local tooling (Node-RED, simulator) only. Not reachable externally.
listener 1883 127.0.0.1
allow_anonymous true

# ── MQTT over TLS — app + bridge ────────────────────────────────────────────
listener 8883
cafile /etc/mosquitto/certs/ca.crt
certfile /etc/mosquitto/certs/server.crt
keyfile /etc/mosquitto/certs/server.key
require_certificate false
allow_anonymous false
password_file /etc/mosquitto/passwd
acl_file /etc/mosquitto/acl
